<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>Wizualizacja trójkąta</title>

    <link rel="stylesheet" href="css/index.css" />
    <script src="https://unpkg.com/konva@8.3.14/konva.min.js"></script>
  </head>

  <body>
    <div id="title">
      <!-- <p id="rodzaj">Ładowanie...</p> -->
      <h1>3ST</h1>
      3 Sides of Triangle
    </div>

    <div id="inputs">
      <input type="text" id="a_side" /> Długość boku a
      <br />
      <input type="text" id="b_side" /> Długość boku b
      <br />
      <input type="text" id="c_side" /> Długość boku c
    </div>

    <button id="calc" onmousedown="calc()">Oblicz!</button>

    <div id="results">
      <div id="canvas">
        <!-- <canvas id="myCanvas" width="500" height="500"></canvas> -->
      </div>

      <div id="legend-div">
        <p id="type" class="legend"></p>
        <p id="L" class="legend"></p>
        <p id="h" class="legend"></p>
        <p id="p" class="legend"></p>
        <p id="k1" class="legend"></p>
        <p id="k2" class="legend"></p>
        <p id="k3" class="legend"></p>
        <p id="time" class="legend"></p>
      </div>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>
